services:
  app:
    build: .

    ports:
      - "8080:8080"
    depends_on:
      - postgres
  postgres:
    image: postgres:latest
    container_name: postgres
    ports:
      - "5431:5432"
    volumes:
      - template:/dataaaa
    environment:
      POSTGRES_PASSWORD: 123123123
      POSTGRES_USER: shuneo
      POSTGRES_DB: database
volumes:
  template: